<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Samsung Account</title>
    <link rel="stylesheet" href="css/create.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
<div class="container">
    <div class="titulo">
        <h1>📝 Samsung Account</h1>
    </div>

    <div class="logo-section">
        <img src="logo2.png" alt="Samsung" class="logo">
        <h2>Criar sua conta</h2>
        <p>Junte-se à comunidade Samsung</p>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="spinner" style="display: none;"></div>

    <form id="cadastro">
        <div class="form-row">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome" placeholder="Seu sobrenome" required>
            </div>
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label for="telefone">Telefone (opcional)</label>
            <input type="tel" id="telefone" placeholder="(11) 99999-9999">
        </div>

        <div class="data">
            <label>Data de nascimento</label>
            <div class="data-grid">
                <input type="number" min="1" max="31" id="dia" placeholder="DD" required>
                <input type="number" min="1" max="12" id="mes" placeholder="MM" required>
                <input type="number" min="1900" max="2026" id="ano" placeholder="AAAA" required>
            </div>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" minlength="6" required>
            <small>✓ Mínimo 6 caracteres | ✓ Letras e números</small>
        </div>

        <div class="form-group">
            <label for="confirmar">Confirmar Senha</label>
            <input type="password" id="confirmar" placeholder="Repita a senha" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="termos" required>
            <label for="termos">Concordo com os <a href="#">Termos de Serviço</a></label>
        </div>

        <!-- Mensagens de feedback -->
        <div id="mensagem" class="mensagem"></div>

        <div class="botoes">
            <button type="button" class="btn btn-secundario" onclick="window.location.href='login.html'">
                ← Voltar
            </button>
            <button type="submit" class="btn btn-primario" id="btnFinalizar">
                ✓ Criar Conta
            </button>
        </div>

        <div class="login-link">
            Já tem conta? <a href="login.html">Fazer login</a>
        </div>
    </form>
</div>

<script type="module" src="Js/auth-create.js"></script>

</body>
</html>

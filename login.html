<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsung Account</title>
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">
    <div class="faixa">
        <h1>Samsung Account</h1>
    </div>

    <div class="login">
        <img class="logo" src="Imagens/logo4.png" alt="Samsung">

        <div class="texto1">
            Bem-vindo(a) ao seu mundo Samsung.
        </div>

        <div class="texto2">
            Entre para começar
        </div>

        <div class="campo">
            <input type="email" id="email" placeholder="E-mail">
        </div>

        <div class="campo">
            <input type="password" id="senha" placeholder="Senha">
        </div>

        <div class="lembrar">
            <input type="checkbox" id="check-lembrar">
            <label style="display:inline; font-size:18px; font-weight:bold;" for="check-lembrar">Lembrar senha</label>
        </div>

        <div class="botoes">
            <button class="btn" onclick="window.location.href='create.html'">
                Criar conta
            </button>

            <!-- Agora chama a função login() -->
            <button class="btn" onclick="login()">
                Avançar
            </button>
        </div>

        <button class="google" onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google">
            Entrar com Google
        </button>
    </div>
</div>

<script type="module">
import { login, googleLogin } from "./Js/auth.js";
window.login = login;
window.googleLogin = googleLogin;
</script>

</body>
</html>
